name: Sunday Bin Reminder

on:
  schedule:
    # GitHub Actions cron is UTC. 19:30 Europe/London is:
    #   18:30 UTC during BST (Mar-Oct)
    #   19:30 UTC during GMT (Nov-Feb)
    # We schedule BOTH and let the first step verify local time + exit early if mismatched.
    - cron: '30 18 * * 0'
    - cron: '30 19 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the 19:30 Europe/London time check'
        required: false
        default: 'false'

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check local time is 19:30 Europe/London (skip if not, unless forced)
        run: |
          LOCAL_TIME=$(TZ=Europe/London date '+%H:%M')
          LOCAL_DOW=$(TZ=Europe/London date '+%u')   # 7 = Sunday
          echo "Europe/London now: $LOCAL_TIME on day-of-week $LOCAL_DOW"
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "Force flag set — running regardless of local time"
            exit 0
          fi
          if [[ "$LOCAL_DOW" != "7" ]]; then
            echo "Not Sunday in Europe/London — exiting"
            exit 1
          fi
          # Allow 19:25-19:45 window
          HOUR=$(TZ=Europe/London date '+%H')
          MIN=$(TZ=Europe/London date '+%M')
          if [[ "$HOUR" != "19" ]] || [[ "$MIN" -lt 25 ]] || [[ "$MIN" -gt 45 ]]; then
            echo "Outside 19:25-19:45 Europe/London window — exiting"
            exit 1
          fi
          echo "Time check passed — proceeding"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --quiet playwright requests && python -m playwright install --with-deps chromium

      - name: Run reminder
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_SENDER:          ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_CEZARY:          ${{ secrets.EMAIL_CEZARY }}
          EMAIL_SUNIA:           ${{ secrets.EMAIL_SUNIA }}
        run: python scripts/run_reminder.py

      - name: Upload reminder image artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bin-reminder-png
          path: /tmp/bin_reminder.png
          if-no-files-found: ignore
