name: Sunday Bin Reminder

on:
  schedule:
    - cron: '30 18 * * 0'   # 19:30 BST (summer)
    - cron: '30 19 * * 0'   # 19:30 GMT (winter)
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the 19:30 Europe/London time check'
        required: false
        default: 'false'

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Time check (19:25-19:45 Europe/London Sunday)
        id: timecheck
        run: |
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "Force flag — proceeding"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          DOW=$(TZ=Europe/London date '+%u')
          HOUR=$(TZ=Europe/London date '+%H')
          MIN=$(TZ=Europe/London date '+%M')
          echo "Europe/London now: ${HOUR}:${MIN} day-of-week=${DOW}"
          if [[ "$DOW" == "7" ]] && [[ "$HOUR" == "19" ]] && [[ "$MIN" -ge 25 ]] && [[ "$MIN" -le 45 ]]; then
            echo "✅ Inside 19:25-19:45 Sunday window — proceeding"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Outside window — silently skipping (the other cron entry handles BST/GMT)"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.timecheck.outputs.should_run == 'true'
      - uses: actions/setup-python@v5
        if: steps.timecheck.outputs.should_run == 'true'
        with:
          python-version: '3.11'
      - name: Install deps
        if: steps.timecheck.outputs.should_run == 'true'
        run: pip install --quiet playwright requests && python -m playwright install --with-deps chromium
      - name: Run reminder
        if: steps.timecheck.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_CEZARY:       ${{ secrets.EMAIL_CEZARY }}
          EMAIL_SUNIA:        ${{ secrets.EMAIL_SUNIA }}
        run: python scripts/run_reminder.py
      - name: Upload artifact
        if: steps.timecheck.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: bin-reminder-png
          path: /tmp/bin_reminder.png
          if-no-files-found: ignore
